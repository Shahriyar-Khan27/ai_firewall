# AI Execution Firewall — default policy rules.
# Sections are keyed by IntentType (lowercased). Each section may define:
#   blocked:           list of regex patterns matched against the rendered command/path
#   blocked_paths:     list of glob patterns matched against the action's path
#   require_approval:  true | false | { risk_at_or_above: LOW|MEDIUM|HIGH|CRITICAL }
#   allowed:           list of regex patterns that override blocked/approval

shell_exec:
  blocked:
    - 'rm\s+-[a-zA-Z]*r[a-zA-Z]*f?\s+/(\s|$)'
    - 'rm\s+-[a-zA-Z]*f[a-zA-Z]*r?\s+/(\s|$)'
    - 'sudo\s+rm\s+-r'
    - ':\(\)\s*\{\s*:\s*\|\s*:\s*&\s*\}\s*;\s*:'
    - 'mkfs(\.|\s)'
    - 'dd\s+if=.*of=/dev/'
    - '>\s*/dev/sd[a-z]'
  require_approval:
    risk_at_or_above: HIGH

file_delete:
  require_approval: true
  blocked:
    - '^/$'

file_write:
  blocked_paths:
    - '/etc/**'
    - '/usr/**'
    - '/boot/**'
    - 'C:/Windows/**'
    - 'C:/Program Files/**'
  require_approval:
    risk_at_or_above: HIGH

code_modify:
  require_approval:
    risk_at_or_above: MEDIUM

file_read:
  blocked_paths:
    - '/etc/shadow'
    - '/etc/sudoers'

shell_read:
  # placeholder — keeps the schema extensible

db_read:
  # SELECT/SHOW/DESCRIBE — generally allowed without prompting.

db_write:
  require_approval:
    risk_at_or_above: HIGH

db_destructive:
  blocked:
    - 'DROP\s+DATABASE'
    - 'DROP\s+SCHEMA'
  require_approval: true

api_read:
  # GET/HEAD/OPTIONS — generally allowed; risk bumps via impact handle SSRF/metadata.
  require_approval:
    risk_at_or_above: HIGH

api_write:
  require_approval:
    risk_at_or_above: MEDIUM

api_destructive:
  # DELETE — always confirm, even to "safe" hosts.
  require_approval: true

network_egress:
  # Raw-socket / file-transfer egress (`nc`, `telnet`, `socat`, `scp`, `rsync`,
  # `sftp`, `ftp`). The firewall can't inspect what flows through a raw socket
  # the way it can for HTTP, so we always confirm.
  require_approval: true

governance:
  # Cost & resource governance. Read-side: scans the local audit log to count
  # recent activity. Disable per-Guard with `enable_governance=False`.
  enabled: true

  rate_limit:
    # Refuse if more than `max` actions of this intent occurred in the last
    # `window` seconds. Tune for your project's normal cadence.
    file_delete: { window: 60s, max: 20 }
    db_destructive: { window: 60s, max: 5 }
    api_destructive: { window: 60s, max: 5 }
    shell_exec: { window: 60s, max: 200 }

  loop_detection:
    # Same exact normalized command repeated too fast = stuck-in-a-loop agent.
    same_command_within: 10s
    max: 5

  budget:
    # Best-effort API "spend" cap, proxied by request-body bytes per 24h.
    # Comment out to disable; set high (e.g. 100_000_000) for noisy projects.
    api_bytes_per_day: 100_000_000
